name: Publish Documentation

on:
  push:
    branches: [main]
    paths:
      - 'Documentation/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render documentation
        run: quarto render Documentation/clean_test.qmd --to html

      - name: Prepare pages
        run: |
          mkdir -p _site
          cp Documentation/clean_test.html _site/index.html
          cp -r Documentation/images _site/images

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
